<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Orders - BookNest</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><i class="fas fa-book-open"></i><span>BookNest</span></div>
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="books.html"><i class="fas fa-books"></i> Books</a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart <span id="cartBadge" class="badge">0</span></a>
        <div id="userLinks" style="display:none">
            <a href="orders.html" class="active"><i class="fas fa-box"></i> My Orders</a>
            <span id="welcomeUser" class="welcome-text"></span>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
        <div id="authLinks"><a href="login.html">Login</a></div>
    </div>
</nav>

<div class="section">
    <h2 class="section-title"><i class="fas fa-box"></i> My Orders</h2>
    <div id="ordersContainer">
        <p class="loading"><i class="fas fa-spinner fa-spin"></i> Loading orders...</p>
    </div>
</div>

<footer class="footer"><div class="footer-bottom">&copy; 2024 BookNest.</div></footer>
<script src="js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        updateNavAuth();
        updateCartBadge();
        const user = getUser();
        if (!user) { window.location = 'login.html'; return; }
        loadOrders(user.userId);
    });

    function loadOrders(userId) {
        fetch(API_BASE + '/orders?userId=' + userId)
            .then(r => r.json())
            .then(orders => {
                const container = document.getElementById('ordersContainer');
                if (orders.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-box-open fa-4x"></i><h3>No orders yet</h3><a href="books.html" class="btn-primary">Start Shopping</a></div>`;
                    return;
                }
                container.innerHTML = orders.map(o => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <strong>Order #${o.id}</strong>
                                <span class="order-date">${new Date(o.orderDate).toLocaleDateString()}</span>
                            </div>
                            <span class="status-badge status-${o.status}">${o.status.toUpperCase()}</span>
                        </div>
                        <div class="order-items">
                            ${o.items ? o.items.map(item => `
                                <div class="order-item-row">
                                    <span>${item.bookTitle}</span>
                                    <span>x${item.quantity}</span>
                                    <span>₹${(item.price * item.quantity).toFixed(2)}</span>
                                </div>
                            `).join('') : ''}
                        </div>
                        <div class="order-footer">
                            <span>Total: <strong>₹${o.totalAmount.toFixed(2)}</strong></span>
                            <span>Ship to: ${o.shippingAddress}</span>
                        </div>
                    </div>
                `).join('');
            });
    }
</script>
</body>
</html>
