<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - BookNest</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-brand"><i class="fas fa-book-open"></i><span>BookNest</span></div>
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="books.html"><i class="fas fa-books"></i> Books</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-book-open fa-3x"></i>
            <h2>Welcome Back</h2>
            <p>Sign in to your BookNest account</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Enter username" required/>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" placeholder="Enter password" required/>
                    <i class="fas fa-eye toggle-pwd" onclick="togglePassword('password')"></i>
                </div>
            </div>
            <div id="loginError" class="form-error" style="display:none"></div>
            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
        <div class="demo-creds">
            <p><strong>Admin Demo:</strong> username: <code>admin</code> | password: <code>admin123</code></p>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<script src="js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (getUser()) window.location = 'index.html';
    });

    function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        fetch(API_BASE + '/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                localStorage.setItem('bookstore_user', JSON.stringify(data));
                showToast('Login successful! Welcome, ' + data.fullName);
                setTimeout(() => {
                    window.location = data.role === 'admin' ? 'admin.html' : 'index.html';
                }, 1000);
            } else {
                const err = document.getElementById('loginError');
                err.textContent = data.message || 'Invalid credentials';
                err.style.display = 'block';
            }
        })
        .catch(() => showToast('Server error. Is the backend running?'));
    }

    function togglePassword(id) {
        const inp = document.getElementById(id);
        inp.type = inp.type === 'password' ? 'text' : 'password';
    }
</script>
</body>
</html>
