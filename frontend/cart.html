<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cart - BookNest</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand"><i class="fas fa-book-open"></i><span>BookNest</span></div>
    <div class="nav-search">
        <input type="text" id="searchInput" placeholder="Search books..."/>
        <button onclick="window.location='books.html?search='+document.getElementById('searchInput').value"><i class="fas fa-search"></i></button>
    </div>
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="books.html"><i class="fas fa-books"></i> Books</a>
        <a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i> Cart <span id="cartBadge" class="badge">0</span></a>
        <div id="authLinks"><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a><a href="register.html"><i class="fas fa-user-plus"></i> Register</a></div>
        <div id="userLinks" style="display:none">
            <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
            <span id="welcomeUser" class="welcome-text"></span>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </div>
</nav>

<div class="cart-page section">
    <h2 class="section-title"><i class="fas fa-shopping-cart"></i> Your Cart</h2>

    <div id="cartEmpty" style="display:none" class="empty-state">
        <i class="fas fa-shopping-cart fa-4x"></i>
        <h3>Your cart is empty</h3>
        <a href="books.html" class="btn-primary">Browse Books</a>
    </div>

    <div id="cartContent">
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-summary" id="cartSummary" style="display:none">
            <h3>Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
            <div class="summary-row"><span>Delivery</span><span>Free</span></div>
            <div class="summary-row total"><span>Total</span><span id="totalAmount">₹0</span></div>
            <div class="address-section">
                <label>Shipping Address *</label>
                <textarea id="shippingAddress" rows="3" placeholder="Enter your full shipping address..."></textarea>
            </div>
            <button class="btn-primary btn-full" onclick="placeOrder()">
                <i class="fas fa-check-circle"></i> Place Order
            </button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<footer class="footer"><div class="footer-bottom">&copy; 2024 BookNest.</div></footer>

<script src="js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        updateNavAuth();
        renderCart();
        updateCartBadge();
    });

    function renderCart() {
        const cart = getCart();
        const itemsDiv = document.getElementById('cartItems');
        const summary = document.getElementById('cartSummary');
        const empty = document.getElementById('cartEmpty');

        if (cart.length === 0) {
            empty.style.display = 'block';
            summary.style.display = 'none';
            itemsDiv.innerHTML = '';
            return;
        }
        empty.style.display = 'none';
        summary.style.display = 'block';

        let total = 0;
        itemsDiv.innerHTML = cart.map(item => {
            total += item.price * item.quantity;
            return `
            <div class="cart-item">
                <div class="cart-item-info">
                    <h4>${item.title}</h4>
                    <p class="author">by ${item.author}</p>
                    <p class="price">₹${item.price.toFixed(2)}</p>
                </div>
                <div class="cart-item-actions">
                    <button class="qty-btn" onclick="changeQty(${item.id}, -1)"><i class="fas fa-minus"></i></button>
                    <span class="qty">${item.quantity}</span>
                    <button class="qty-btn" onclick="changeQty(${item.id}, 1)"><i class="fas fa-plus"></i></button>
                    <button class="remove-btn" onclick="removeFromCart(${item.id})"><i class="fas fa-trash"></i></button>
                </div>
                <div class="item-total">₹${(item.price * item.quantity).toFixed(2)}</div>
            </div>`;
        }).join('');

        document.getElementById('subtotal').textContent = '₹' + total.toFixed(2);
        document.getElementById('totalAmount').textContent = '₹' + total.toFixed(2);
    }

    function changeQty(bookId, delta) {
        let cart = getCart();
        const idx = cart.findIndex(i => i.id === bookId);
        if (idx >= 0) {
            cart[idx].quantity += delta;
            if (cart[idx].quantity <= 0) cart.splice(idx, 1);
        }
        saveCart(cart);
        updateCartBadge();
        renderCart();
    }

    function removeFromCart(bookId) {
        let cart = getCart().filter(i => i.id !== bookId);
        saveCart(cart);
        updateCartBadge();
        renderCart();
        showToast('Book removed from cart');
    }

    function placeOrder() {
        const user = getUser();
        if (!user) { showToast('Please login to place an order'); window.location='login.html'; return; }

        const address = document.getElementById('shippingAddress').value.trim();
        if (!address) { showToast('Please enter a shipping address'); return; }

        const cart = getCart();
        const total = cart.reduce((sum, i) => sum + i.price * i.quantity, 0);

        const order = {
            userId: user.userId,
            totalAmount: total,
            shippingAddress: address,
            items: cart.map(i => ({ bookId: i.id, quantity: i.quantity, price: i.price }))
        };

        fetch(API_BASE + '/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(order)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                saveCart([]);
                updateCartBadge();
                showToast('Order placed successfully! Order #' + data.orderId);
                setTimeout(() => window.location = 'orders.html', 2000);
            } else {
                showToast('Failed to place order. Please try again.');
            }
        });
    }
</script>
</body>
</html>
