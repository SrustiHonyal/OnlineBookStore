<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register - BookNest</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-brand"><i class="fas fa-book-open"></i><span>BookNest</span></div>
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="books.html"><i class="fas fa-books"></i> Books</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-user-plus fa-3x"></i>
            <h2>Create Account</h2>
            <p>Join BookNest and start reading</p>
        </div>
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="fullName" placeholder="Your full name" required/>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-at"></i> Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required/>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="you@example.com" required/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Min. 6 characters" required/>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat password" required/>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone</label>
                <input type="text" id="phone" placeholder="Your phone number"/>
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Address</label>
                <textarea id="address" rows="2" placeholder="Your shipping address (optional)"></textarea>
            </div>
            <div id="regError" class="form-error" style="display:none"></div>
            <div id="regSuccess" class="form-success" style="display:none"></div>
            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<script src="js/main.js"></script>
<script>
    function handleRegister(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const errDiv = document.getElementById('regError');

        if (password !== confirm) {
            errDiv.textContent = 'Passwords do not match!';
            errDiv.style.display = 'block';
            return;
        }
        if (password.length < 6) {
            errDiv.textContent = 'Password must be at least 6 characters.';
            errDiv.style.display = 'block';
            return;
        }
        errDiv.style.display = 'none';

        const user = {
            fullName: document.getElementById('fullName').value,
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value
        };

        fetch(API_BASE + '/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(user)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                document.getElementById('regSuccess').textContent = 'Account created! Redirecting to login...';
                document.getElementById('regSuccess').style.display = 'block';
                setTimeout(() => window.location = 'login.html', 2000);
            } else {
                errDiv.textContent = data.message || 'Registration failed';
                errDiv.style.display = 'block';
            }
        });
    }
</script>
</body>
</html>
