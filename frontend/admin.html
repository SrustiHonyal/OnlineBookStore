<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Dashboard - BookNest</title>
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<nav class="navbar">
    <div class="nav-brand"><i class="fas fa-book-open"></i><span>BookNest Admin</span></div>
    <div class="nav-links">
        <a href="index.html"><i class="fas fa-home"></i> Site</a>
        <span id="welcomeUser" class="welcome-text"></span>
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</nav>

<div class="admin-container">
    <!-- Admin Sidebar -->
    <aside class="admin-sidebar">
        <ul>
            <li class="active" onclick="showTab('books')"><i class="fas fa-book"></i> Books</li>
            <li onclick="showTab('orders')"><i class="fas fa-box"></i> Orders</li>
            <li onclick="showTab('add-book')"><i class="fas fa-plus"></i> Add Book</li>
        </ul>
    </aside>

    <!-- Admin Content -->
    <main class="admin-main">

        <!-- Books Tab -->
        <div id="tab-books" class="admin-tab">
            <h2><i class="fas fa-book"></i> Manage Books</h2>
            <div id="adminBooksTable">
                <p class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</p>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="tab-orders" class="admin-tab" style="display:none">
            <h2><i class="fas fa-box"></i> All Orders</h2>
            <div id="adminOrdersTable">
                <p class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</p>
            </div>
        </div>

        <!-- Add Book Tab -->
        <div id="tab-add-book" class="admin-tab" style="display:none">
            <h2><i class="fas fa-plus-circle"></i> Add New Book</h2>
            <form id="addBookForm" onsubmit="submitBook(event)" class="admin-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="aTitle" required/>
                    </div>
                    <div class="form-group">
                        <label>Author *</label>
                        <input type="text" id="aAuthor" required/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN</label>
                        <input type="text" id="aIsbn"/>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="aCategory" required>
                            <option value="1">Fiction</option>
                            <option value="2">Science & Tech</option>
                            <option value="3">Self Help</option>
                            <option value="4">History</option>
                            <option value="5">Children</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price (₹) *</label>
                        <input type="number" id="aPrice" step="0.01" required/>
                    </div>
                    <div class="form-group">
                        <label>Stock *</label>
                        <input type="number" id="aStock" required/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Publisher</label>
                        <input type="text" id="aPublisher"/>
                    </div>
                    <div class="form-group">
                        <label>Publish Year</label>
                        <input type="number" id="aYear" min="1000" max="2099"/>
                    </div>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="aImage" placeholder="https://..."/>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="aDesc" rows="3"></textarea>
                </div>
                <div id="addMsg" class="form-success" style="display:none"></div>
                <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Book</button>
            </form>
        </div>

    </main>
</div>

<div id="toast" class="toast"></div>
<script src="js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = getUser();
        if (!user || user.role !== 'admin') { window.location = 'login.html'; return; }
        document.getElementById('welcomeUser').textContent = 'Hi, ' + user.fullName;
        loadAdminBooks();
    });

    function showTab(name) {
        document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.admin-sidebar li').forEach(l => l.classList.remove('active'));
        document.getElementById('tab-' + name).style.display = 'block';
        event.target.closest('li').classList.add('active');
        if (name === 'orders') loadAdminOrders();
        if (name === 'books') loadAdminBooks();
    }

    function loadAdminBooks() {
        fetch(API_BASE + '/books')
            .then(r => r.json())
            .then(books => {
                const div = document.getElementById('adminBooksTable');
                div.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>ID</th><th>Title</th><th>Author</th><th>Price</th><th>Stock</th><th>Category</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${books.map(b => `
                                <tr>
                                    <td>${b.id}</td>
                                    <td>${b.title}</td>
                                    <td>${b.author}</td>
                                    <td>₹${b.price}</td>
                                    <td><span class="${b.stock < 5 ? 'low-stock' : ''}">${b.stock}</span></td>
                                    <td>${b.categoryName || '-'}</td>
                                    <td>
                                        <button class="btn-small btn-danger" onclick="deleteBook(${b.id})"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            });
    }

    function deleteBook(id) {
        if (!confirm('Are you sure you want to delete this book?')) return;
        fetch(API_BASE + '/books/' + id, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.success) { showToast('Book deleted'); loadAdminBooks(); }
                else showToast('Delete failed');
            });
    }

    function loadAdminOrders() {
        fetch(API_BASE + '/orders/all')
            .then(r => r.json())
            .then(orders => {
                const div = document.getElementById('adminOrdersTable');
                div.innerHTML = `
                    <table class="admin-table">
                        <thead><tr><th>ID</th><th>User</th><th>Total</th><th>Status</th><th>Date</th><th>Update</th></tr></thead>
                        <tbody>
                            ${orders.map(o => `
                                <tr>
                                    <td>#${o.id}</td>
                                    <td>User ${o.userId}</td>
                                    <td>₹${o.totalAmount}</td>
                                    <td><span class="status-badge status-${o.status}">${o.status}</span></td>
                                    <td>${new Date(o.orderDate).toLocaleDateString()}</td>
                                    <td>
                                        <select onchange="updateStatus(${o.id}, this.value)">
                                            <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
                                            <option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option>
                                            <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
                                            <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
                                            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
                                        </select>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            });
    }

    function updateStatus(orderId, status) {
        fetch(API_BASE + `/orders/${orderId}/status?status=${status}`, { method: 'PUT' })
            .then(r => r.json())
            .then(data => showToast(data.success ? 'Status updated' : 'Update failed'));
    }

    function submitBook(e) {
        e.preventDefault();
        const book = {
            title: document.getElementById('aTitle').value,
            author: document.getElementById('aAuthor').value,
            isbn: document.getElementById('aIsbn').value,
            categoryId: parseInt(document.getElementById('aCategory').value),
            price: parseFloat(document.getElementById('aPrice').value),
            stock: parseInt(document.getElementById('aStock').value),
            description: document.getElementById('aDesc').value,
            imageUrl: document.getElementById('aImage').value,
            publisher: document.getElementById('aPublisher').value,
            publishYear: parseInt(document.getElementById('aYear').value) || 0
        };
        fetch(API_BASE + '/books', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(book)
        })
        .then(r => r.json())
        .then(data => {
            const msg = document.getElementById('addMsg');
            msg.textContent = data.success ? 'Book added successfully!' : 'Failed to add book';
            msg.className = data.success ? 'form-success' : 'form-error';
            msg.style.display = 'block';
            if (data.success) document.getElementById('addBookForm').reset();
        });
    }
</script>
</body>
</html>
